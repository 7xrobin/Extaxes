<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InvestBuddy{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  <nav class="sidebar">
    <div class="logo">InvestBuddy</div>
    <a href="/chat/"      {% if request.path == '/chat/' %}class="active"{% endif %}>💬 Chat</a>
    <a href="/portfolio/" {% if request.path|slice:":11" == '/portfolio/' %}class="active"{% endif %}>📊 Portfolio</a>
    <a href="/digest/"    {% if request.path == '/digest/' %}class="active"{% endif %}>📅 Digest</a>

    {% if chat_sessions %}
    <div class="sessions-list">
      {% for s in chat_sessions %}
      <div class="session-row {% if s.id == active_chat_session_id %}active{% endif %}">
        <a href="/chat/switch/{{ s.id }}/" class="session-link">{{ s.title|truncatechars:22 }}</a>
        <form method="post" action="/chat/delete/{{ s.id }}/" class="session-delete-form">
          {% csrf_token %}
          <button type="submit" class="btn-delete-session" title="Delete chat">×</button>
        </form>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="spacer"></div>

    <form method="post" action="/chat/new/">
      {% csrf_token %}
      <button type="submit" class="btn-new-chat">+ New Chat</button>
    </form>

    <div class="user-bar">
      <span class="user-label">{{ request.user.username }}</span>
      <form method="post" action="/accounts/logout/" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn-signout">Sign out</button>
      </form>
    </div>
  </nav>

  <div class="main">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
